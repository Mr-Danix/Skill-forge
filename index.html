<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge – Smart Skill Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

       
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

     
        .input-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 0.8rem;
            border: 1px solid var(--border);
            background: var(--bg-color);
            color: var(--text-main);
            outline: none;
            font-size: 1rem;
        }

        button.btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        button.btn-add:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

       
        .skill-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .skill-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: slideIn 0.4s ease-out;
            transition: var(--transition);
            position: relative;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .skill-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.2rem;
        }

        .level-badge {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .streak-fire {
            font-size: 0.9rem;
            color: #f59e0b;
            font-weight: 600;
        }

        
        .progress-container {
            background: var(--bg-color);
            height: 10px;
            border-radius: 10px;
            margin: 1rem 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .xp-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
            display: block;
        }

        
        .actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1.2rem;
        }

        .hour-input {
            width: 80px;
        }

        .btn-log {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.5rem;
            border-radius: 0.6rem;
            cursor: pointer;
            margin-left: auto;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        
        @media (max-width: 600px) {
            .input-card {
                flex-direction: column;
            }
            .actions {
                flex-wrap: wrap;
            }
            .hour-input {
                width: 100%;
            }
            .btn-log {
                width: 100%;
            }
        }
    </style>
</head>
<body data-theme="light">

    <div class="container">
        <header>
            <h1>Skill Tracker</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 </button>
        </header>

        <section class="input-card">
            <input type="text" id="skillInput" placeholder="What skill are you forging? (e.g. Piano, Coding)" maxlength="25">
            <button class="btn-add" onclick="addSkill()">Add Skill</button>
        </section>

        <div id="skillGrid" class="skill-grid">
            </div>
    </div>

    <script>
        let skills = JSON.parse(localStorage.getItem('skills')) || [];

        
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'light') {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = "☀️ Light Mode";
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = "🌙 Dark Mode";
            }
        }

      
        function addSkill() {
            const input = document.getElementById('skillInput');
            const name = input.value.trim();

            if (!name) return;

            const newSkill = {
                id: Date.now(),
                name: name,
                totalXP: 0,
                streak: 0,
                lastDate: null 
            };

            skills.push(newSkill);
            input.value = '';
            saveAndRender();
        }

        function logPractice(id) {
            const hourInput = document.getElementById(`hours-${id}`);
            const hours = parseFloat(hourInput.value);

            if (isNaN(hours) || hours <= 0) return;

            const skill = skills.find(s => s.id === id);
            const today = new Date().toDateString();

            
            skill.totalXP += (hours * 10);

            
            if (skill.lastDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                
                if (skill.lastDate === yesterday.toDateString()) {
                    skill.streak += 1;
                } else {
                    skill.streak = 1;
                }
                skill.lastDate = today;
            }

            hourInput.value = '';
            saveAndRender();
        }

        function deleteSkill(id) {
            if (confirm('Delete this skill? Your progress will be lost forever!')) {
                skills = skills.filter(s => s.id !== id);
                saveAndRender();
            }
        }

        function calculateLevelData(xp) {
            const level = Math.floor(xp / 100) + 1;
            const progress = xp % 100; 
            return { level, progress };
        }

        function saveAndRender() {
            localStorage.setItem('skills', JSON.stringify(skills));
            renderSkills();
        }

        function renderSkills() {
            const grid = document.getElementById('skillGrid');
            grid.innerHTML = '';

            if (skills.length === 0) {
                grid.innerHTML = `<p style="text-align:center; color: var(--text-muted); margin-top: 2rem;">No skills tracked yet. Start forging above!</p>`;
                return;
            }

            skills.forEach(skill => {
                const { level, progress } = calculateLevelData(skill.totalXP);
                
                const card = document.createElement('div');
                card.className = 'skill-card';
                card.innerHTML = `
                    <div class="skill-header">
                        <div class="skill-info">
                            <span class="level-badge">Level ${level}</span>
                            <h3>${skill.name}</h3>
                        </div>
                        <div class="streak-fire">
                            ${skill.streak > 0 ? `🔥 ${skill.streak} Day Streak` : '❄️ No Streak'}
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${progress}%"></div>
                    </div>
                    <span class="xp-text">${progress} / 100 XP to next level (Total: ${skill.totalXP} XP)</span>

                    <div class="actions">
                        <input type="number" id="hours-${skill.id}" class="hour-input" placeholder="Hours" min="0" step="0.5">
                        <button class="btn-log" onclick="logPractice(${skill.id})">Log Hours</button>
                        <button class="btn-delete" onclick="deleteSkill(${skill.id})">
                            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        
        renderSkills();
    </script>
</body>
</html>
